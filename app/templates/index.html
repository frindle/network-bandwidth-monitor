<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --rx:        #3fb950;
      --tx:        #f85149;
      --accent:    #58a6ff;
      --hover:     #1f2937;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    #live-rates {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: var(--muted);
    }

    .rate-item { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .rate-label { font-size: 11px; color: var(--muted); }
    .rate-value { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .rate-rx { color: var(--rx); }
    .rate-tx { color: var(--tx); }

    main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab-group, .range-group {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }

    .tab-group button, .range-group button {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .tab-group button:hover, .range-group button:hover { background: var(--hover); color: var(--text); }
    .tab-group button.active, .range-group button.active {
      background: var(--accent);
      color: #fff;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
    }

    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; }

    #chart-container { position: relative; height: 280px; }

    /* ── connections table ── */
    .conn-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .conn-count {
      font-size: 11px;
      background: var(--hover);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    thead th:hover { color: var(--text); }
    thead th.sorted-asc::after  { content: ' ↑'; }
    thead th.sorted-desc::after { content: ' ↓'; }

    tbody tr { border-bottom: 1px solid rgba(48,54,61,0.5); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--hover); }

    td { padding: 9px 12px; vertical-align: middle; }

    .host-cell { display: flex; flex-direction: column; gap: 2px; }
    .hostname   { font-weight: 500; }
    .ip-small   { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }

    .port-badge {
      display: inline-block;
      background: rgba(88,166,255,0.15);
      color: var(--accent);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .proto-badge {
      display: inline-block;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .proto-tcp { background: rgba(63,185,80,0.15); color: var(--rx); }
    .proto-udp { background: rgba(248,81,73,0.15);  color: var(--tx); }

    .bar-cell { display: flex; align-items: center; gap: 8px; }
    .bar-bg {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      min-width: 60px;
      max-width: 120px;
    }
    .bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
    .bytes-val { font-variant-numeric: tabular-nums; color: var(--text); min-width: 70px; text-align: right; }

    .iface-badge {
      font-size: 11px;
      color: var(--muted);
      background: var(--hover);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 13px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      margin-top: -10px;
      margin-bottom: 20px;
    }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--rx);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>

<header>
  <h1>Network Monitor</h1>
  <div id="live-rates"></div>
</header>

<main>
  <div id="status-bar">
    <div class="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>

  <div class="toolbar">
    <span class="label">Interface</span>
    <div class="tab-group" id="iface-tabs">
      <button class="active" data-iface="all">All</button>
    </div>
    <span class="label" style="margin-left:8px">Range</span>
    <div class="range-group" id="range-btns">
      <button data-range="1h">1h</button>
      <button data-range="6h">6h</button>
      <button class="active" data-range="24h">24h</button>
      <button data-range="7d">7d</button>
      <button data-range="30d">30d</button>
      <button data-range="all">All</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Bandwidth</span>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--rx)"></div>Download (RX)</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--tx)"></div>Upload (TX)</div>
      </div>
    </div>
    <div id="chart-container">
      <canvas id="bwChart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="conn-header">
      <span class="card-title">Top Destinations</span>
      <span class="conn-count" id="conn-count">0</span>
    </div>
    <table id="conn-table">
      <thead>
        <tr>
          <th data-col="hostname">Host</th>
          <th data-col="remote_port">Port</th>
          <th data-col="protocol">Proto</th>
          <th data-col="total_bytes">Total</th>
          <th data-col="tx_bytes">↑ Sent</th>
          <th data-col="rx_bytes">↓ Received</th>
          <th data-col="hits">Samples</th>
        </tr>
      </thead>
      <tbody id="conn-body"></tbody>
    </table>
    <div class="empty-state" id="conn-empty" style="display:none">No connection data yet — check back in a minute.</div>
  </div>
</main>

<script>
  const API = '';
  let currentIface = 'all';
  let currentRange = '24h';
  let bwChart      = null;
  let sortCol      = 'total_bytes';
  let sortDir      = 'desc';
  let connData     = [];
  let maxBytes     = 1;

  // ── helpers ────────────────────────────────────────────────────────────────

  function fmtBytes(b) {
    if (b === 0) return '0 B';
    const u = ['B','KB','MB','GB','TB'];
    const i = Math.floor(Math.log(b) / Math.log(1024));
    return (b / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 2) + ' ' + u[i];
  }

  function fmtMbps(mbps) {
    if (mbps >= 1000) return (mbps / 1000).toFixed(2) + ' Gbps';
    if (mbps >= 1)    return mbps.toFixed(2) + ' Mbps';
    return (mbps * 1000).toFixed(1) + ' Kbps';
  }

  function tsLabel(ts, range) {
    const d = new Date(ts * 1000);
    if (range === '1h' || range === '6h') {
      return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    if (range === '24h') {
      return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }
    return d.toLocaleDateString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
  }

  function knownPort(port) {
    const m = {80:'HTTP',443:'HTTPS',53:'DNS',22:'SSH',25:'SMTP',587:'SMTP',993:'IMAP',
               143:'IMAP',110:'POP3',3306:'MySQL',5432:'Postgres',6379:'Redis',
               27017:'MongoDB',8080:'HTTP-alt',8443:'HTTPS-alt',123:'NTP',
               21:'FTP',3389:'RDP',5900:'VNC',1194:'OpenVPN',51820:'WireGuard',
               4500:'IPSec',500:'IKE',67:'DHCP',68:'DHCP',161:'SNMP',162:'SNMP'};
    return m[port] || null;
  }

  // ── chart ──────────────────────────────────────────────────────────────────

  function initChart() {
    const ctx = document.getElementById('bwChart').getContext('2d');
    bwChart = new Chart(ctx, {
      type: 'line',
      data: { labels: [], datasets: [
        { label: 'Download (RX)', data: [], borderColor: '#3fb950', backgroundColor: 'rgba(63,185,80,0.08)',
          borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3 },
        { label: 'Upload (TX)',   data: [], borderColor: '#f85149', backgroundColor: 'rgba(248,81,73,0.08)',
          borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3 },
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1f2937',
            borderColor: '#30363d',
            borderWidth: 1,
            titleColor: '#8b949e',
            bodyColor: '#e6edf3',
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${fmtMbps(ctx.raw)}`
            }
          }
        },
        scales: {
          x: { ticks: { color: '#8b949e', maxTicksLimit: 8, maxRotation: 0 },
               grid:  { color: 'rgba(48,54,61,0.5)' } },
          y: { ticks: { color: '#8b949e',
                        callback: v => fmtMbps(v) },
               grid:  { color: 'rgba(48,54,61,0.5)' },
               min: 0 }
        }
      }
    });
  }

  async function refreshBandwidth() {
    try {
      const iface = currentIface === 'all' ? 'eth0' : currentIface;
      const res  = await fetch(`${API}/api/bandwidth?iface=${iface}&range=${currentRange}`);
      const data = await res.json();
      bwChart.data.labels               = data.map(d => tsLabel(d.ts, currentRange));
      bwChart.data.datasets[0].data     = data.map(d => d.rx);
      bwChart.data.datasets[1].data     = data.map(d => d.tx);
      bwChart.update('none');
    } catch(e) { console.error('bandwidth fetch', e); }
  }

  // ── interfaces ────────────────────────────────────────────────────────────

  async function refreshInterfaces() {
    try {
      const res  = await fetch(`${API}/api/interfaces`);
      const data = await res.json();

      const container = document.getElementById('iface-tabs');
      const existing  = new Set([...container.querySelectorAll('[data-iface]')].map(b => b.dataset.iface));
      data.forEach(iface => {
        if (!existing.has(iface.name)) {
          const btn = document.createElement('button');
          btn.dataset.iface = iface.name;
          btn.textContent   = iface.name;
          btn.addEventListener('click', () => setIface(iface.name));
          container.appendChild(btn);
        }
      });

      const liveEl = document.getElementById('live-rates');
      liveEl.innerHTML = data.map(iface => `
        <div class="rate-item">
          <span class="rate-label">${iface.name}</span>
          <span class="rate-value rate-rx">↓ ${fmtMbps(iface.rx_mbps)}</span>
          <span class="rate-value rate-tx">↑ ${fmtMbps(iface.tx_mbps)}</span>
        </div>`).join('');

      document.getElementById('status-text').textContent =
        `Live · updated ${new Date().toLocaleTimeString()}`;
    } catch(e) {
      document.getElementById('status-text').textContent = 'Connection error';
    }
  }

  // ── connections ───────────────────────────────────────────────────────────

  async function refreshConnections() {
    try {
      const res  = await fetch(`${API}/api/connections?iface=${currentIface}&range=${currentRange}`);
      connData   = await res.json();
      maxBytes   = Math.max(1, ...connData.map(r => r.total_bytes));
      renderConnTable();
    } catch(e) { console.error('connections fetch', e); }
  }

  function renderConnTable() {
    const col    = sortCol;
    const dir    = sortDir === 'asc' ? 1 : -1;
    const sorted = [...connData].sort((a, b) => {
      const av = a[col] ?? 0, bv = b[col] ?? 0;
      if (typeof av === 'string') return dir * av.localeCompare(bv);
      return dir * (av - bv);
    });

    document.querySelectorAll('thead th').forEach(th => {
      th.classList.remove('sorted-asc', 'sorted-desc');
      if (th.dataset.col === col) th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    });

    const body  = document.getElementById('conn-body');
    const empty = document.getElementById('conn-empty');
    document.getElementById('conn-count').textContent = sorted.length;

    if (sorted.length === 0) {
      body.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    const portLabel = p => {
      const known = knownPort(p);
      return known ? `<span class="port-badge" title="${p}">${known}</span>` :
                     `<span class="port-badge">${p}</span>`;
    };

    body.innerHTML = sorted.map(r => {
      const isIP     = r.hostname === r.remote_ip;
      const hostCell = isIP
        ? `<div class="host-cell"><span class="hostname ip-small">${r.remote_ip}</span></div>`
        : `<div class="host-cell"><span class="hostname">${r.hostname}</span><span class="ip-small">${r.remote_ip}</span></div>`;
      const pct      = Math.round(r.total_bytes / maxBytes * 100);
      const barFill  = `<div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>`;
      const protoClass = r.protocol === 'tcp' ? 'proto-tcp' : 'proto-udp';
      return `<tr>
        <td>${hostCell}</td>
        <td>${portLabel(r.remote_port)}</td>
        <td><span class="proto-badge ${protoClass}">${r.protocol}</span></td>
        <td><div class="bar-cell">${barFill}<span class="bytes-val">${fmtBytes(r.total_bytes)}</span></div></td>
        <td class="bytes-val">${fmtBytes(r.tx_bytes)}</td>
        <td class="bytes-val">${fmtBytes(r.rx_bytes)}</td>
        <td style="color:var(--muted)">${r.hits}</td>
      </tr>`;
    }).join('');
  }

  // ── state setters ─────────────────────────────────────────────────────────

  function setIface(iface) {
    currentIface = iface;
    document.querySelectorAll('#iface-tabs button').forEach(b =>
      b.classList.toggle('active', b.dataset.iface === iface));
    refreshAll();
  }

  function setRange(range) {
    currentRange = range;
    document.querySelectorAll('#range-btns button').forEach(b =>
      b.classList.toggle('active', b.dataset.range === range));
    refreshAll();
  }

  async function refreshAll() {
    await Promise.all([refreshBandwidth(), refreshConnections()]);
  }

  // ── event listeners ───────────────────────────────────────────────────────

  document.getElementById('iface-tabs').addEventListener('click', e => {
    if (e.target.matches('button')) setIface(e.target.dataset.iface);
  });
  document.getElementById('range-btns').addEventListener('click', e => {
    if (e.target.matches('button')) setRange(e.target.dataset.range);
  });
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      if (sortCol === th.dataset.col) {
        sortDir = sortDir === 'desc' ? 'asc' : 'desc';
      } else {
        sortCol = th.dataset.col;
        sortDir = 'desc';
      }
      renderConnTable();
    });
  });

  // ── init + polling ────────────────────────────────────────────────────────

  initChart();
  refreshInterfaces();
  refreshAll();

  setInterval(refreshInterfaces,  10000);
  setInterval(refreshAll,         30000);
</script>
</body>
</html>
