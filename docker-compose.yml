services:
  netmon:
    build: .
    container_name: netmon
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /proc/1/net:/host/net:ro
      - netmon_data:/data
    environment:
      - DB_PATH=/data/netmon.db
      - NET_BASE=/host/net
    networks:
      br0:
        ipv4_address: 10.0.9.47

networks:
  br0:
    external: true

volumes:
  netmon_data:
