services:
  netmon:
    build: .
    container_name: netmon
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      # Mounts host PID-1's network namespace so we see Unraid's interfaces/conntrack
      - /proc/1/net:/host/net:ro
      # Persistent SQLite database
      - netmon_data:/data
    environment:
      - DB_PATH=/data/netmon.db
      - NET_BASE=/host/net
    networks:
      netmon_macvlan:
        ipv4_address: 10.0.9.47

networks:
  netmon_macvlan:
    driver: macvlan
    driver_opts:
      # br0  = main LAN bridge (Unraid default, shim-br0 lets the host reach this container)
      # br0.10 = VLAN 10 bridge — use this if 10.0.0.0/20 is on VLAN 10
      parent: br0
    ipam:
      driver: default
      config:
        - subnet: 10.0.0.0/20
          # Set this to your actual network gateway
          gateway: 10.0.0.1

volumes:
  netmon_data:
