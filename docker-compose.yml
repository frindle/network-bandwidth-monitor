services:
  netmon:
    build: .
    container_name: netmon
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /proc/1/net:/host/net:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /root/.ssh/id_firewalla:/root/.ssh/id_firewalla:ro
      - netmon_data:/data
    env_file: .env
    networks:
      br0:
        ipv4_address: ${CONTAINER_IP}

networks:
  br0:
    external: true

volumes:
  netmon_data:
